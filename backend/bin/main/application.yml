server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/sdno?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

logging:
  level:
    com.kids: DEBUG

app:
  jwtSecret: ${JWT_SECRET:h4T9W1zC7eKqXbL3yN5vG8zM0rP4sF1aE6uB2nD5oI8V0wH7jQ9xZk2mA3dR6tY8pL}
  jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
  frontendUrl: ${FRONTEND_URL:http://localhost:5173}
  allowedOrigins: ${ALLOWED_ORIGINS:http://localhost:5173}
