databaseChangeLog:
  - changeSet:
      id: 1
      author: antigravity
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: picture
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: antigravity
      changes:
        - createTable:
            tableName: words
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: value
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: language
                  type: varchar(10)
                  defaultValue: VI
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
        - addForeignKeyConstraint:
            baseTableName: words
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_word_user

  - changeSet:
      id: 3
      author: antigravity
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: email
                  value: dongbahung6@gmail.com
              - column:
                  name: name
                  value: Admin
        - update:
            tableName: words
            columns:
              - column:
                  name: user_id
                  valueComputed: "(SELECT id FROM users WHERE email = 'dongbahung6@gmail.com')"
            where: user_id IS NULL
